<style>
  html { -webkit-tap-highlight-color: rgba(0,0,0,0); -webkit-text-size-adjust: 100%; overflow-x: hidden; }
  body {
    margin: 0; padding: 0;
    font: clamp(15px, 2.5vw, 30px)/1em system-ui, sans-serif;
    /* Apply -0.005em globally — very subtle tightening, just enough to bring
       a hint of cohesion across wine rows, year column, footer, tasting note
       and the chrome elements (section labels, top/bottom bars, splash text). */
    letter-spacing: -0.005em;
    width: 100%; min-height: 100%;
    background: #F5F5F5; color: #141415;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a, a:visited { color: #141415; text-decoration: underline; text-underline-offset: 0.15em; }
  a:hover { color: #2D2FFF; }

  .tc { box-sizing: border-box; padding: 0.5em 0.25em 1.5em 0.25em; }

  .section-label {
    color: #2D2FFF; padding: 0 0 0.25em 0;
    font-size: 1em; letter-spacing: -0.005em;
    display: flex; justify-content: space-between; align-items: baseline; gap: 1em;
    text-transform: uppercase;
    /* Sit above the fixed top header so CELLAR / 9 BOTTLES are visible
       on the same line as SCHÜLLER FERRARI. Below the intro covers (z 105). */
    position: relative; z-index: 102;
  }
  /* The section label that contains sort controls (i.e. Tasted) has three
     children: label / sort buttons / count. Grid 1fr-auto-1fr should
     symmetrically centre the middle column — but in practice intrinsic
     content sizing on `1fr` columns plus the row's own `gap` can pull
     things subtly off-centre. Solution: flex layout for the side labels,
     absolute-positioned sort buttons pinned to viewport centre via
     left:50% + translateX(-50%). The buttons are guaranteed to sit on
     the screen's horizontal midline regardless of how much text is on
     either side. */
  .section-label:has(.sort-controls) {
    display: flex;
    position: relative;
    align-items: baseline;
    gap: 0;
  }
  .section-label:has(.sort-controls) > :nth-child(1) { flex: 1; text-align: left; }
  .section-label:has(.sort-controls) > :nth-child(3) { flex: 1; text-align: right; }
  .section-label:has(.sort-controls) .sort-controls {
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
  }
  .section-label + table { margin-bottom: 0.25em; }

  /* Sort controls sit next to "Tasted", inheriting the label's uppercase/orange
     styling. Active sort is at full opacity; inactive options fade to 0.4 and
     come back on hover. Plain buttons (no border/background) to read as text. */
  .sort-controls {
    display: inline-flex;
    gap: 0.6em;
  }
  .sort-controls button {
    background: none; border: none; padding: 0;
    font: inherit; color: inherit;
    text-transform: inherit; letter-spacing: inherit;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 200ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .sort-controls button.active,
  .sort-controls button:hover { opacity: 1; }

  table { table-layout: fixed; border-collapse: collapse; padding: 0; margin: 0 0 1em 0; width: 100%; }
  tr { border-bottom: 1px solid rgba(20,20,21,0.25); }
  td { padding: 0.25em; box-sizing: border-box; vertical-align: top; font-weight: normal; overflow-wrap: break-word; }
  .col-year { text-align: right; padding-right: 0; white-space: nowrap; }

  /* Identical column widths in Cellar and Tasted, at every viewport.
     Year takes 13% (just enough for a 4-digit year on narrow mobile);
     the remaining 87% splits across the three text columns. */
  .c-name { width: calc((100% - 13%) / 3); }
  .c-prod { width: calc((100% - 13%) / 3); }
  .c-grap { width: calc((100% - 13%) / 3); }
  .c-year { width: 13%; }

  /* Dot lives inside the wine-name cell. Negative text-indent pulls the dot
     back to the cell edge so wrapped lines align with the wine name text. */
  td.col-name { padding-left: 1.75em; text-indent: -1.5em; }
  .dot {
    display: inline-block; height: 1em; width: 1em; border-radius: 1em;
    margin-right: 0.5em; vertical-align: top;
  }
  .dot.red    { background-color: #E63946; }
  .dot.pink   { background-color: #DB2777; }
  .dot.orange { background-color: #F5A623; }
  .dot.white  { background-color: #FACC15; }

  /* Tasted rows: wine details visible by default; hover (desktop) or tap
     (mobile, via .is-revealed) cross-fades into a tasting note anchored to
     the top of the row.

     The reveal lives in the producer (col-prod) cell, spanning two table
     columns visually. Inside the reveal:
       Column 1 — labels (Score: / Date: / Notes:) align with the vigneron
                  text; column 1's width = col-prod's content width so
                  column 1's right edge lands exactly on grape-text-x.
       Column 2 — values (the score, the date, the note prose) align with
                  the grape text; column 2 = 1fr, fills the remaining width
                  up to grape-text-right.

     Wine name brightens to full alpha on hover (the row's identifier
     "popping"); producer / grape / year fade to a faint ghost. Reveal
     grows the row downward via min-height on a .col-inner wrapper inside
     td.col-prod (min-height transitions on <td> directly are unreliable;
     a <div> inside the td works consistently). */
  tr.tasted { cursor: pointer; }
  /* Tasted rows sit in the same grey as the row separators — a quiet
     historical record, visually subordinate to the live cellar above. */
  tr.tasted td { color: rgba(20,20,21,0.25); }

  /* .col-inner wraps the producer span + (on tasted rows) the .reveal.
     position:relative establishes the containing block for the absolute
     .reveal; min-height grows to --reveal-height on hover/tap (JS-set
     after every render) so the row expands to fit. */
  tr.tasted td.col-prod .col-inner {
    position: relative;
    min-height: 0;
    transition: min-height 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Opacity transitions. We don't transition td.col-prod itself — opacity
     on the td would dim the .reveal child. Instead we transition the
     producer span inside .col-inner. The whole td works for col-grap and
     col-year (no reveal child to protect). Wine name in col-name gets a
     color transition (not opacity) — see the hover rules below. */
  tr.tasted td.col-name,
  tr.tasted td.col-year { transition: color 400ms cubic-bezier(0.4, 0, 0.2, 1); }
  tr.tasted td.col-grap { transition: opacity 400ms cubic-bezier(0.4, 0, 0.2, 1); }
  tr.tasted td.col-prod .col-inner > :not(.reveal) {
    transition: opacity 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  tr.tasted td.col-prod .col-inner .reveal {
    position: absolute;
    /* Top-anchored so the note starts where the producer text was and
       grows downward as content needs. */
    top: 0;
    /* left:0 anchors at .col-inner's left edge = col-prod's content edge
       = producer-text-x. */
    left: 0;
    /* Width spans from producer text left to grape text right. Reveal
       overflows past col-prod's right boundary into col-grap territory
       (absolute positioning + td overflow:visible). Geometry:
         producer-text-x  = col-prod-left + 0.25em
         grape-text-right = col-grap-right - 0.25em
                          = col-prod-left + 2*col-w - 0.25em
                            where col-w = 29% of table-width
         reveal width     = grape-text-right - producer-text-x
                          = 2*col-w - 0.5em
                          = 0.58*(100vw - 0.5em - --sb) - 0.5em
                          = 58vw - 0.79em - 0.58*--sb */
    width: calc(58vw - 0.79em - 0.58 * var(--sb, 0px));
    /* Grid: column 1 sized to col-prod's content width so column 2 begins
       exactly at grape-text-x; column 2 (1fr) takes the rest, ending at
       grape-text-right. Column 1 width = col-prod content width:
         col-prod-width   = 29% of table-width
                          = 29vw - 0.145em - 0.29*--sb (rounded to 0.15em).
       minmax(max-content, calc) floors the column at the widest label's
       natural width so labels never wrap or get clipped on tiny viewports
       where the calc value would drop below the label width. column-gap 0
       so column 2 starts exactly at grape-text-x — no extra offset. */
    display: grid;
    grid-template-columns: minmax(max-content, calc(29vw - 0.15em - 0.29 * var(--sb, 0px))) 1fr;
    column-gap: 0;
    text-align: left;
    text-indent: 0;
    /* pre-line preserves \n in user-typed notes so paragraph breaks in
       the textarea show as line breaks within the Notes value. The three
       rows of the reveal are created by grid auto-flow, not by \n. */
    white-space: pre-line;
    color: #141415; opacity: 0; pointer-events: none;
    transition: opacity 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Desktop hover:
     - col-name text color brightens from rgba(20,20,21,0.25) to full
       #141415 — the wine name pops as the row's identifier. The dot's
       background-color is at 100% alpha and is unaffected.
     - Producer / grape / year fade to 0.3 element opacity (× 0.25 text
       alpha ≈ 0.075 effective — watermark trail).
     - Reveal fades to 1; col-prod's .col-inner grows to fit it. */
  tr.tasted:hover td.col-name,
  tr.tasted:hover td.col-year { color: #141415; }
  tr.tasted:hover td.col-prod .col-inner > :not(.reveal) { opacity: 0.3; }
  tr.tasted:hover td.col-grap { opacity: 0.3; }
  tr.tasted:hover td.col-prod .col-inner .reveal { opacity: 1; }
  tr.tasted:hover td.col-prod .col-inner { min-height: var(--reveal-height, 0); }
  /* Touch devices: same effect gated on .is-revealed (toggled in JS).
     Scoped to (hover: none) so a stale .is-revealed on desktop (e.g. from
     an accidental click on a touchscreen laptop) doesn't stick once the
     cursor leaves. */
  @media (hover: none) {
    tr.tasted.is-revealed td.col-name,
    tr.tasted.is-revealed td.col-year { color: #141415; }
    tr.tasted.is-revealed td.col-prod .col-inner > :not(.reveal) { opacity: 0.3; }
    tr.tasted.is-revealed td.col-grap { opacity: 0.3; }
    tr.tasted.is-revealed td.col-prod .col-inner .reveal { opacity: 1; }
    tr.tasted.is-revealed td.col-prod .col-inner { min-height: var(--reveal-height, 0); }
  }

  /* Federico's idea: cover starts as a white→white 100% mask (visually
     identical to a solid fill). At the end of the slide, one stop of the
     mask transitions to alpha 0 — the inner edge of the cover (bottom of
     cover1, top of cover2) dissolves to transparent. Because it's a mask
     rather than a background gradient, the dissolution fades the cover
     entirely — background AND text together — so the cover doesn't leave
     a floating text behind. @property registers --cover-alpha as a typed
     number so the mask gradient interpolates frame-by-frame. */
  @property --cover-alpha {
    syntax: '<number>';
    initial-value: 1;
    inherits: false;
  }
  #cover1, #cover2 {
    position: fixed; left: 0; right: 0; height: 50vh;
    background: #F5F5F5; z-index: 105; color: #2D2FFF;
    letter-spacing: -0.005em; pointer-events: none; user-select: none;
    text-align: center;
    --cover-alpha: 1;
    -webkit-mask-mode: alpha;
    mask-mode: alpha;
  }
  #cover1 {
    top: 0;
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0, var(--cover-alpha)) 100%);
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0, var(--cover-alpha)) 100%);
  }
  #cover2 {
    top: 50vh;
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0, var(--cover-alpha)) 100%);
    mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0, var(--cover-alpha)) 100%);
  }
  #cover1 span { position: absolute; left: 0; right: 0; bottom: 0; }
  #cover2 span { position: absolute; left: 0; right: 0; top: 0; }
  #wall {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #2D2FFF; z-index: 104; pointer-events: none; user-select: none;
  }
  /* Two separate triggers: .opacity starts the slide (transform only);
     .gone starts the dissolution (--cover-alpha only). The dissolution
     therefore happens AFTER the slide, when the cover has reached its
     final resting position. */
  #cover1, #cover2 {
    transition:
      transform 2000ms cubic-bezier(0.83, 0, 0.17, 1),
      --cover-alpha 800ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  #wall { transition: opacity 2000ms cubic-bezier(0.83, 0, 0.17, 1); }
  /* Compressed intro for return visits — ~1s total instead of ~3s.
     Triggered by body.intro-fast which the JS adds when sessionStorage shows
     the user has already seen the full splash this session. */
  body.intro-fast #cover1,
  body.intro-fast #cover2 {
    transition:
      transform 700ms cubic-bezier(0.83, 0, 0.17, 1),
      --cover-alpha 400ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  body.intro-fast #wall { transition: opacity 700ms cubic-bezier(0.83, 0, 0.17, 1); }
  #cover1.opacity { transform: translate(0, calc(-50vh + 1.5em)); }
  #cover2.opacity { transform: translate(0, calc(50vh - 1.5em)); }
  #cover1.gone, #cover2.gone { --cover-alpha: 0; }
  #wall.opacity { opacity: 0; }

  .top, .bottom {
    position: fixed; left: 0; right: 0; z-index: 102;
    color: #2D2FFF; pointer-events: none; user-select: none;
    text-align: center; letter-spacing: -0.005em;
    text-transform: uppercase;
  }
  /* Gradient backdrop sits on a ::before pseudo so it can be visible from
     page load — the covers above (z 105) mask it initially, then naturally
     reveal it as they slide apart. No separate fade-in needed; the gradient
     "appears" as a function of cover position. */
  .top::before, .bottom::before {
    content: ""; position: absolute; inset: 0;
    z-index: -1; pointer-events: none;
  }

  /* The top "logo" needs to be selectable; covers above it have
     pointer-events: none so clicks pass through to the header underneath. */
  .top { pointer-events: auto; user-select: text; -webkit-user-select: text; }
  .top { top: 0; padding: 0.5em 1em; }
  .bottom { bottom: 0; padding: 0.5em 1em; }
  .top::before {
    background: linear-gradient(0deg, rgba(245,245,245,0) 0%, rgba(245,245,245,0.85) 50%);
  }
  .bottom::before {
    background: linear-gradient(180deg, rgba(245,245,245,0) 0%, rgba(245,245,245,0.85) 50%);
  }
  /* Text inside the bars sits at opacity 1 from page load — the covers
     above feather their inner edge to transparent during the slide, so
     the logo and quote are revealed naturally through that gradient.
     The transition on .bottom-text is for the quote rotation only —
     short duration (200ms) so the invisible moment at the swap boundary
     is imperceptible. */
  .top-text, .bottom-text { display: inline-block; }
  .bottom-text { transition: opacity 200ms cubic-bezier(0.4, 0, 0.2, 1); }
  .bottom .one   { transition: opacity 400ms cubic-bezier(0.83, 0, 0.17, 1); }
  .bottom .two   { transition: opacity 1800ms cubic-bezier(0.83, 0, 0.17, 1); }
  .bottom .three { transition: opacity 1000ms cubic-bezier(0.83, 0, 0.17, 1); }

  .hide { opacity: 0 !important; }

  .footer {
    padding: 0 0.25em 0 0.25em;
    line-height: 1em;
    text-align: center;
    text-transform: uppercase;
    color: #2D2FFF;
    /* Sit above the fixed quote bar (z-index 102) so its semi-opaque gradient
       backdrop doesn't wash out the footer text when scrolled to the bottom.
       z-index needs position to take effect, hence position: relative. */
    position: relative;
    z-index: 103;
  }
  .footer a, .footer a:visited { color: #2D2FFF; text-decoration: none; }

  .empty { padding: 1em 0; opacity: 0.5; }

  /* Visually-hidden but accessible to screen readers. Used on the table <thead>
     so assistive tech can announce "Producer column" etc. without adding any
     visible chrome. */
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
</style>
</head>

<header class="top"><span class="top-text">SCHÜLLER&nbsp;&nbsp;FERRARI</span></header>

<main class="tc">

  <div class="footer">

<footer class="bottom">
  <span class="bottom-text">
    <span class="one">CORKERS</span> <span class="two">COLLECTORS</span> <span class="three">CONNOISSEURS</span>
  </span>

<script>
function formatDate(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  return `${String(d).padStart(2, "0")}/${String(m).padStart(2, "0")}/${y}`;
}
function formatDateObj(d) {
  return `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}/${d.getFullYear()}`;
}
function formatScore(s) {
  const whole = Math.floor(s);
  const half = s - whole >= 0.5;
  return half ? `${whole}½` : `${whole}`;
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
}
const TYPE_LABELS = { red: "Red wine", pink: "Rosé wine", orange: "Orange wine", white: "White wine" };
function rowHTML(w, tasted) {
  const typeLabel = TYPE_LABELS[w.type] || "Wine";
  // Build the reveal as label/value span pairs. CSS grid (auto 1fr) lays
  // them out in two columns: labels in column 1 (sized to the widest,
  // "Date tasted:"), values in column 2 aligned to the same x. Auto-flow
  // gives each pair its own row. "Notes:" only appears if the bottle has
  // notes; esc() applies to every cell so user-typed notes are HTML-safe.
  let revealHTML = "";
  if (tasted) {
    const pairs = [
      ["Score:", formatScore(w.score)],
      ["Date:", formatDate(w.tasted)],
    ];
    if (w.notes) pairs.push(["Notes:", w.notes]);
    // No whitespace between the label and value spans — grid items are
    // determined by element boundaries; stray text nodes from indentation
    // would become unwanted extra grid items.
    const inner = pairs.map(([label, val]) =>
      `<span class="rev-label">${esc(label)}</span><span class="rev-val">${esc(val)}</span>`
    ).join("");
    revealHTML = `<span class="reveal">${inner}</span>`;
  }
  // .col-inner wraps the producer span + .reveal inside col-prod so we can
  // transition its min-height reliably. The producer is wrapped in a span
  // so :not(.reveal) can target it for the opacity fade (selectors can't
  // target text nodes). Grape is plain text now that the reveal lives in
  // col-prod again.
  return `
    <tr class="${tasted ? "tasted" : ""}">
      <td class="col-name"><span class="dot ${w.type}" role="img" aria-label="${typeLabel}"></span><span>${esc(w.name)}</span></td>
      <td class="col-prod"><div class="col-inner"><span>${esc(w.producer)}</span>${revealHTML}</div></td>
      <td class="col-grap">${esc(w.grapes)}</td>
      <td class="col-year">${esc(w.year)}</td>
    </tr>`;
}

const TYPE_ORDER = { red: 0, pink: 1, orange: 2, white: 3 };

// State for the Tasted section's sort. Direction is -1 (desc) or +1 (asc).
// Natural defaults: date and score start desc (newest/highest first); alpha
// starts asc (A → Z). Clicking the active sort flips its direction; clicking
// a different sort switches to that sort in its default direction.
const SORT_DEFAULTS = { date: -1, score: -1, alpha: 1 };
let allTasted = [];
let currentSort = "score";
let currentDir = SORT_DEFAULTS.score;

function sortTasted(arr, mode, dir) {
  const copy = arr.slice();
  const dateAsc = (a, b) => (a.tasted || "").localeCompare(b.tasted || "");
  switch (mode) {
    case "score":
      return copy.sort((a, b) =>
        ((a.score || 0) - (b.score || 0)) * dir
        || dateAsc(a, b) * dir);
    case "alpha":
      // Wine name alphabetical. Year DESC as tiebreak — same wine, newer
      // vintage first; doesn't flip with primary direction.
      return copy.sort((a, b) =>
        a.name.localeCompare(b.name) * dir
        || (b.year || 0) - (a.year || 0));
    case "date":
    default:
      return copy.sort((a, b) => dateAsc(a, b) * dir);
  }
}

function renderTastedTable() {
  const sorted = sortTasted(allTasted, currentSort, currentDir);
  document.getElementById("tbody-tasted").innerHTML =
    sorted.map(w => rowHTML(w, true)).join("")
    || `<tr><td colspan="4" class="empty">Nothing tasted yet.</td></tr>`;
  // Re-measure after every render — the rows are fresh DOM nodes, the old
  // measurements (if any) are gone with the previous innerHTML.
  updateRevealHeights();
}

/* For each tasted row, read its .reveal span's natural rendered height and
   expose it as --reveal-height on the <tr>. The CSS uses this to grow the
   row's min-height on hover/tap, so the cross-fade stays in-place even
   when the note is taller than the wine info beneath it.

   .reveal is opacity:0 but absolutely positioned with a known width, so
   its offsetHeight is computed — we can read it without making it visible.
   Called after every render (rows change) and after every resize (the
   reveal reflows with viewport width — a 4-line note on mobile may be 1
   line on desktop). */
function updateRevealHeights() {
  document.querySelectorAll("tr.tasted").forEach(row => {
    const reveal = row.querySelector(".reveal");
    if (!reveal) { row.style.removeProperty("--reveal-height"); return; }
    const h = reveal.offsetHeight;
    if (h) row.style.setProperty("--reveal-height", h + "px");
  });
}

function render(wines, lastModified) {
  const cellar = wines.filter(w => !w.tasted)
    .sort((a, b) => (TYPE_ORDER[a.type] - TYPE_ORDER[b.type]) || (b.year - a.year) || a.name.localeCompare(b.name));
  allTasted = wines.filter(w => w.tasted);

  document.getElementById("tbody-cellar").innerHTML =
    cellar.map(w => rowHTML(w, false)).join("")
    || `<tr><td colspan="4" class="empty">Empty. Time to buy more wine.</td></tr>`;
  renderTastedTable();

  document.getElementById("count-cellar").textContent =
    `${cellar.length} ${cellar.length === 1 ? "bottle" : "bottles"}`;
  document.getElementById("count-tasted").textContent =
    `${allTasted.length} ${allTasted.length === 1 ? "bottle" : "bottles"}`;

  // "Last updated" reflects when wines.json was last written (via admin.php)
  const lastDate = lastModified ? new Date(lastModified) : null;
  document.getElementById("last-updated").textContent =
    (lastDate && !isNaN(lastDate)) ? formatDateObj(lastDate) : "—";
}

// Wire up the sort controls. Buttons exist in the DOM by the time this runs
// (script is at end of body), so no need to wait for DOMContentLoaded.

// Sync every sort button's label with the current state. Every button always
// shows a ▲/▼ arrow advertising its direction — for the active button, the
// current direction; for inactive buttons, the direction they'd jump to on
// click (i.e. SORT_DEFAULTS). So the arrows are always truthful about what
// the next click will do. Alpha's letters stay locked at "AZ"; only its arrow
// flips when direction changes.
function updateSortLabels() {
  document.querySelectorAll(".sort-controls button").forEach(b => {
    const sort = b.dataset.sort;
    const isActive = sort === currentSort;
    const dir = isActive ? currentDir : SORT_DEFAULTS[sort];
    const arrow = dir === -1 ? "▼" : "▲";
    const base = sort === "alpha" ? "AZ" : b.dataset.label;
    b.textContent = `${base}${arrow}`;
  });
}

document.querySelectorAll(".sort-controls button").forEach(btn => {
  btn.addEventListener("click", () => {
    const clicked = btn.dataset.sort;
    if (clicked === currentSort) {
      // Re-clicking the active sort flips its direction.
      currentDir = -currentDir;
    } else {
      // Switching to a different sort: jump to that sort's natural direction.
      currentSort = clicked;
      currentDir = SORT_DEFAULTS[clicked];
    }
    document.querySelectorAll(".sort-controls button").forEach(b =>
      b.classList.toggle("active", b.dataset.sort === currentSort));
    updateSortLabels();
    renderTastedTable();
  });
});

/* Measure the vertical scrollbar gutter and expose it as --sb on the root,
   so the tasted-row overlay can size itself to the visible content area
   rather than full 100vw (which includes scrollbar gutter on Windows /
   Linux / some browser+OS combos). On Mac with overlay scrollbars this
   resolves to 0 and the calc is unchanged. */
const updateScrollbarWidth = () => {
  const sb = window.innerWidth - document.documentElement.clientWidth;
  document.documentElement.style.setProperty("--sb", sb + "px");
  // Width change reflows the reveal — a 3-line note on narrow mobile may be
  // 1 line on wide desktop, so the row needs re-measuring on every resize.
  updateRevealHeights();
};
updateScrollbarWidth();
window.addEventListener("resize", updateScrollbarWidth);

// Cache-bust so the public page always reflects the latest admin edits
fetch("wines.json?v=" + Date.now())
  .then(r => {
    const lastModified = r.headers.get("Last-Modified");
    return r.json().then(data => render(data, lastModified));
  })
  .catch(err => {
    console.error("Couldn’t load the wine list:", err);
    document.getElementById("tbody-cellar").innerHTML =
      `<tr><td colspan="4" class="empty">Couldn’t load the wine list. Try refreshing.</td></tr>`;
  });

// Tap a tasted row to reveal its note (mobile-friendly equivalent of hover).
// Only registered on touch-primary devices — on desktop we rely on :hover
// alone, so clicks don't cause the reveal to stick after the mouse leaves.
// Delegated on the tbody so it works for rows inserted after page load.
// Tapping a second row closes the first, mirroring single-row hover on desktop.
if (window.matchMedia("(hover: none)").matches) {
  document.getElementById("tbody-tasted").addEventListener("click", (e) => {
    const row = e.target.closest("tr.tasted");
    if (!row) return;
    const wasRevealed = row.classList.contains("is-revealed");
    document.querySelectorAll("tr.tasted.is-revealed").forEach(r => r.classList.remove("is-revealed"));
    if (!wasRevealed) row.classList.add("is-revealed");
  });
}

/* Intro animation — always plays. ~2.8s on first visit, ~1.1s on return
   visits (tracked via sessionStorage, so once-per-session). */
const isRevisit = sessionStorage.getItem("introShown");
sessionStorage.setItem("introShown", "1");
if (isRevisit) document.body.classList.add("intro-fast");

const introStart    = isRevisit ? 100 : 1500;
const slideDuration = isRevisit ? 700 : 2000;
const fadeDuration  = isRevisit ? 400 : 800;
/* .opacity triggers the slide. After the slide finishes, .gone triggers
   the mask dissolution that takes the cover (and its text) away as a
   single unit. Two phases, sequential — not overlapping. */
const introEnd = introStart + slideDuration;

setTimeout(() => {
  document.getElementById("cover1").classList.add("opacity");
  document.getElementById("cover2").classList.add("opacity");
  document.getElementById("wall").classList.add("opacity");
}, introStart);
setTimeout(() => {
  document.getElementById("cover1").classList.add("gone");
  document.getElementById("cover2").classList.add("gone");
}, introEnd);

/* Random quote — a new one each time the footer comes into view */
const QUOTES = [
  "In wine, there’s truth",
  "Wine makes all things possible",
  "All worries are less with wine",
  "Wine is bottled poetry",
  "I prefer my water in wine form",
  "Drink wine, drink poetry, drink virtue",
  "Wine transforms moles into eagles",
  "(Wine is) the nurse of old age",
  "The wine, the sadness and the night",
  "Where there is no wine, there is no love"
];
/* The bottom bar cycles forever: CORKERS COLLECTORS CONNOISSEURS at first,
   then a random quote every 5 seconds. The 400ms fade matches the
   tasted-row hover transition so the page has one consistent rhythm.
   Top and bottom always stay visible. */
const bottomEl = document.querySelector(".bottom-text");
let lastQuoteIndex = -1;
function nextQuote() {
  let i;
  do { i = Math.floor(Math.random() * QUOTES.length); } while (QUOTES.length > 1 && i === lastQuoteIndex);
  lastQuoteIndex = i;
  return QUOTES[i];
}
function cycleBottom() {
  /* Use transitionend rather than setTimeout so the text swap and fade-in
     kick in on the exact frame the fade-out completes — no JS timer drift,
     no perceptible gap. { once: true } makes the listener self-clean. */
  bottomEl.addEventListener("transitionend", () => {
    bottomEl.textContent = nextQuote();
    bottomEl.style.opacity = "1";
  }, { once: true });
  bottomEl.style.opacity = "0";
}
/* Don't start cycling until the cover is fully dissolved — otherwise the
   cover2 "CORKERS COLLECTORS CONNOISSEURS" text overlays the bar's new
   quote and makes it unreadable. First cycle fires 3.5s after the cover
   is gone, giving the user time to read the static initial text. */
setTimeout(() => {
  setInterval(cycleBottom, 3500);
}, introEnd + fadeDuration);
</script>
